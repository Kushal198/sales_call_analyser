services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  worker:
    build: .
    command: uv run celery -A core worker --loglevel=info
    volumes:
      - .:/app
      - /app/.venv
    env_file:
      - .env
    depends_on:
      - redis

  beat:
    build: .
    command: uv run celery -A core beat --loglevel=info
    volumes:
      - .:/app
      - /app/.venv
    env_file:
      - .env
    depends_on:
      - redis
      - worker